<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Loop and Stitch mark</title>
  <desc id="desc">Rounded black badge with white border, white L and S lettering, red stitch line and red accent dot.</desc>
  <rect x="3" y="3" width="58" height="58" rx="18" fill="#000000" stroke="#ffffff" stroke-width="4" />
  <text x="18" y="39" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="800">L</text>
  <text x="37" y="39" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="800">S</text>
  <rect x="15" y="30" width="34" height="4" rx="2" fill="#ff3030" />
  <circle cx="50" cy="15" r="6" fill="#ff3030" />
</svg>